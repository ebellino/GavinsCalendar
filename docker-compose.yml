services:
  app:
    build: .
    ports:
      # Bound to localhost only - the app has no login, so anyone who can
      # reach this port can read/save your events. Change to "3000:3000" if
      # you want to access it from another device on your network, but know
      # that opens it to your whole LAN.
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://gavin:gavin@db:5432/gavin_bot?schema=public
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
      SEATGEEK_CLIENT_ID: ${SEATGEEK_CLIENT_ID:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      # Bound to localhost only, just so `npx prisma migrate dev` can reach it
      # from the host during development. Never expose this beyond localhost -
      # it uses a fixed, public default password since it's Docker-internal only.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: gavin
      POSTGRES_PASSWORD: gavin
      POSTGRES_DB: gavin_bot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gavin -d gavin_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
